# --- Stream plugin listener ---------------------------------------------------
# Bind the stream protocol on all interfaces inside the container.
stream.listeners.tcp.1 = 5552

# CRITICAL streams gotcha: after the initial connect, the broker replies with the
# host/port the client should actually use to reach the stream's leader/replicas.
# By default that is the node's (container) hostname, which a client on the Docker
# *host* cannot resolve. Advertise localhost so host-side apps can connect.
# In a real cluster you would advertise the externally-routable address per node.
stream.advertised_host = localhost
stream.advertised_port = 5552

# --- Sensible defaults for a single-node dev broker ---------------------------
# Initial size of a stream replica's in-memory cache; defaults are fine, kept here
# as a documented knob.
# stream.initial_credits = 50000

# Block publishers when the node gets within this much of the disk limit, instead
# of risking a hard stop. Tune for the host; conservative default for laptops.
disk_free_limit.absolute = 2GB

# Log to console so `docker compose logs` shows everything.
log.console = true
log.console.level = info
